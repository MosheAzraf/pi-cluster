apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage
  namespace: homepage
  #annotations:
  #  cert-manager.io/cluster-issuer: internal-ca
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`homepage.home.lab`)
      services:
        - kind: Service
          name: homepage
          port: 3000
          sticky:
            cookie:
              httpOnly: true
              secure: true
              sameSite: none
  tls:
    secretName: homepage-tls