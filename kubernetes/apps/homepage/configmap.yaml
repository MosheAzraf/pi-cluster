apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    background: https://images.unsplash.com/photo-1502790671504-542ad42d5189?auto=format&fit=crop&w=2560&q=80

  custom.css: ""
  custom.js: ""

  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/MosheAzraf

  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            icon: argo-cd.png
            href: https://argocd.home.lab/

        - Traefik:
            icon: traefik.png
            href: https://traefik.home.lab/dashboard/

        - AdGuard Home:
            icon: adguard-home.png
            href: http://10.0.0.140/
            description: runs on external server (rpi5)
            ping: 10.0.0.140

    - Storage(test):
        - OpenMediaVault:
            icon: openmediavault.png
            href: http://10.0.0.140:8080/#/dashboard
            description: runs on external server (rpi5)
            ping: 10.0.0.140
        
        - Test

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default

    - search:
        provider: duckduckgo
        target: _blank

  docker.yaml: ""
