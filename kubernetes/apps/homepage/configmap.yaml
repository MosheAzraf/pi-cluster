apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    background: https://images.unsplash.com/photo-1502790671504-542ad42d5189?auto=format&fit=crop&w=2560&q=80

  custom.css: ""
  custom.js: ""

  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/MosheAzraf

  services.yaml: |
    - Platform:
        - ArgoCD:
            icon: argo-cd.png
            href: https://argocd.home.lab/
            description: GitOps continuous delivery for Kubernetes
        
        - Traefik:
            icon: traefik.png
            href: https://traefik.home.lab/dashboard/
            description: ingress controller and traffic routing for the cluster

    - Observability:
        - Grafana:
            icon: grafana.png
            href: https://grafana.home.lab/
            description: monitoring dashboards
            widget:
              type: grafana
              version: 2
              alerts: alertmanager
              url: http://monitoring-prometheus-grafana.monitoring.svc:80
              username: {{HOMEPAGE_VAR_GRAFANA_USERNAME}}
              password: {{HOMEPAGE_VAR_GRAFANA_PASSWORD}}

        - Prometheus:
            icon: prometheus.png
            href: https://prometheus.home.lab/
            description: metrics collection
            widget:
              type: prometheusmetric
              url: http://monitoring-prometheus-kube-prometheus.monitoring.svc:9090
              refreshInterval: 10000
              metrics:
                - label: Active Alerts
                  query: alertmanager_alerts{state="active"}

                - label: Targets Up
                  query: prometheus_target_interval_length_seconds_count

    - Data Services:
        - PostgreSQL (CloudNativePG):
            icon: postgres.png
            href: https://pg.home.lab/
            description: in-cluster database

    - External Services (Pi5):
        - AdGuard Home:
            icon: adguard-home.png
            href: http://10.0.0.140/
            description: network-wide DNS filtering and ad blocking
            ping: 10.0.0.140

            widget:
              type: adguard 
              url: http://10.0.0.140
              username: {{HOMEPAGE_VAR_ADGUARD_USERNAME}}
              password: {{HOMEPAGE_VAR_ADGUARD_PASSWORD}}

        - OpenMediaVault:
            icon: openmediavault.png
            href: http://10.0.0.140:8080/#/dashboard
            description: NAS and storage management on external server
            ping: 10.0.0.140
            widget:
              type: openmediavault
              url: http://10.0.0.140:8080
              username: {{HOMEPAGE_VAR_OMV_USERNAME}}
              password: {{HOMEPAGE_VAR_OMV_PASSWORD}}
              method: services.getStatus

    - Apps:
      - Placeholder:
            icon: mdi-apps
            href: "#"
            description: applications will be added here

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true


    - search:
        provider: duckduckgo
        target: _blank

  docker.yaml: ""
