apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: ""
  #settings.yaml: |
  #  providers:
  #    longhorn:
  #      url: https://longhorn.my.network
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/MosheAzraf

  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            href: https://argocd.home.lab/
        
        - Traefik:
            href: https://traefik.home.lab/dashboard/  

        - AdGuard Home:
            href: http://10.0.0.140/
    
    - Storage:
        - OpenMediaVault:
            href: http://10.0.0.140:8080/#/dashboard
          
    
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
    - traefik:
        url: http://traefik.traefik.svc.cluster.local:8080
        routers: true
        services: true
        middleware: true

  docker.yaml: ""