apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    api:
      dashboard: true
      insecure: true

    providers:
      kubernetesIngress:
        enabled: true
        ingressClass: traefik

    ports:
      web:
        port: 80
        expose: true
      websecure:
        port: 443
        expose: true
      traefik:
        port: 9000
        expose: true
