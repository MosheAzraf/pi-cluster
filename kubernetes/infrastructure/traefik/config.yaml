apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    api:
      enabled: true
      dashboard: true
      insecure: true

    providers:
      kubernetesIngress:
        enabled: true
        ingressClass: traefik

    ports:
      web:
        port: 80
        expose:
          default: true
      websecure:
        port: 443
        expose:
          default: true
      traefik:
        port: 9000
        expose:
          default: true


    service:
      additionalPorts:
        - name: traefik
          port: 9000
          targetPort: 9000
