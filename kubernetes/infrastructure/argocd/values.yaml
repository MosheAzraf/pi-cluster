# HA mode
redis-ha:
  enabled: true

controller:
  replicas: 1

server:
  autoscaling:
    enabled: true
    minReplicas: 2

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 2

  # ---- KSOPS START ----
  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: ksops-bin
      emptyDir: {}
    - name: sops-age
      secret:
        secretName: sops-age

  initContainers:
    - name: ksops-bin
      image: viaductoss/ksops:v4.4.0
      command: ["sleep", "infinity"]
      volumeMounts:
        - name: ksops-bin
          mountPath: /ksops

    - name: install-ksops
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          echo "Installing ksops and kustomize"
          cp /ksops/ksops /custom-tools/ksops
          cp /ksops/kustomize /custom-tools/kustomize
          chmod +x /custom-tools/*
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools
        - name: ksops-bin
          mountPath: /ksops

  env:
    - name: SOPS_AGE_KEY_FILE
      value: /.config/sops/age/keys.txt

  volumeMounts:
    - name: custom-tools
      mountPath: /usr/local/bin/ksops
      subPath: ksops
    - name: custom-tools
      mountPath: /usr/local/bin/kustomize
      subPath: kustomize
    - name: sops-age
      mountPath: /.config/sops/age
  # ---- KSOPS END ----

applicationSet:
  replicas: 2

configs:
  params:
    server.insecure: true
  cm:
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"


