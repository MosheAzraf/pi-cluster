# -------------------------
# HA mode
# -------------------------
redis-ha:
  enabled: true

controller:
  replicas: 1

server:
  autoscaling:
    enabled: true
    minReplicas: 2

applicationSet:
  replicas: 2

# -------------------------
# Repo Server + KSOPS
# -------------------------
repoServer:
  autoscaling:
    enabled: true
    minReplicas: 2

  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: sops-age
      secret:
        secretName: sops-age

  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.4.0
      command: ["/usr/bin/install"]
      args:
        - -m
        - "0755"
        - /usr/local/bin/ksops
        - /custom-tools/ksops
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools

  env:
    - name: SOPS_AGE_KEY_FILE
      value: /.config/sops/age/keys.txt

  volumeMounts:
    - name: custom-tools
      mountPath: /usr/local/bin/ksops
      subPath: ksops
    - name: sops-age
      mountPath: /.config/sops/age

# -------------------------
# ArgoCD config
# -------------------------
configs:
  params:
    server.insecure: true
  cm:
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"


