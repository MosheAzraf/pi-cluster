#HA mode
redis-ha:
  enabled: true

controller:
  replicas: 1

server:
  autoscaling:
    enabled: true
    minReplicas: 2

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 2
  
  #ksops
  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: sops-age
      secret:
        secretName: sops-age
  initContainers:
    - name: install-ksops
      image: alpine:latest
      command: ["/bin/sh", "-c"]
      args:
        - |
          wget https://github.com/viaduct-ai/kustomize-sops/releases/download/v4.4.0/ksops_4.4.0_Linux_x86_64.tar.gz
          tar -xzf ksops_4.4.0_Linux_x86_64.tar.gz
          mv ksops /custom-tools/
          chmod +x /custom-tools/ksops
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools
  env:
    - name: SOPS_AGE_KEY_FILE
      value: /.config/sops/age/keys.txt
    - name: XDG_CONFIG_HOME
      value: /.config

  volumeMounts:
    - mountPath: /usr/local/bin/ksops
      name: custom-tools
      subPath: ksops
    - mountPath: /.config/sops/age
      name: sops-age
  #end of ksops

applicationSet:
  replicas: 2

configs:
  params:
    server.insecure: true
  cm:
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"

