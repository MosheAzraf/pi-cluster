apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: cloudnative-pg
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  instances: 2
  enableSuperuserAccess: true

  superuserSecret:
    name: postgres-superuser

  bootstrap:
    initdb:
      database: postgres
      owner: postgres

  storage:
    size: 10Gi
    storageClass: local-path

  managed:
    services:
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: postgres-rw-lb
            spec:
              type: LoadBalancer
    
    roles:
      - name: linkding
        ensure: present
        login: true
        inherit: true
        connectionLimit: -1
        superuser: false
        passwordSecret:
          name: linkding-db-secret
    



