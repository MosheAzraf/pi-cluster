#ha configuration

prometheus:
  prometheusSpec:
    replicas: 2
    # Ensures replicas are scheduled on different nodes for High Availability
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: prometheus
            topologyKey: kubernetes.io/hostname
    
    # Persist metrics data using k3s default local-path storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Resource optimization for Raspberry Pi nodes
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi

alertmanager:
  alertmanagerSpec:
    replicas: 2
    # Gossip protocol timeout to prevent duplicate alerts
    clusterPeerTimeout: 15s
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: alertmanager
            topologyKey: kubernetes.io/hostname
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

grafana:
  replicas: 1 
  # Increase delay to handle slow plugin installation/DB migrations on Pi
  readinessProbe:
    initialDelaySeconds: 90
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 90
    periodSeconds: 10
    
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi