apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-linkding
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://github.com/MosheAzraf/pi-cluster.git
      targetRevision: main
      path: kubernetes/apps/linkding/

  destination:
    server: https://kubernetes.default.svc
    namespace: linkding

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
