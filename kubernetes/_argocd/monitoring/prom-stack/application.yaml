apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-prom-stack
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 81.5.0
      helm:
        skipSchemaValidation: true
        valueFiles:
          - $values/kubernetes/monitoring/prom-stack/values.yaml
    - repoURL: https://github.com/MosheAzraf/pi-cluster.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
