apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 81.5.0
      helm:
        skipSchemaValidation: true
        valueFiles:
          - $values/kubernetes/monitoring/kube-prometheus-stack/values.yaml
    - repoURL: https://github.com/MosheAzraf/pi-cluster.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/MosheAzraf/pi-cluster.git
      targetRevision: main
      path: kubernetes/monitoring/kube-prometheus-stack

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: monitoring-kube-prometheus-stack-grafana
      jsonPointers:
        - /spec/template/metadata/annotations/checksum~1secret