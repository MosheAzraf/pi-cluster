apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-prometheus
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 81.5.0
      helm:
        skipSchemaValidation: true
        valueFiles:
          - $values/kubernetes/monitoring/prometheus/values.yaml
    - repoURL: https://github.com/MosheAzraf/pi-cluster.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  ignoreDifferences:
    # Ignore Grafana admin credentials secret generated by Helm
    - group: ""
      kind: Secret
      name: monitoring-prometheus-grafana
      namespace: monitoring
      jsonPointers:
        - /data

    # Ignore checksum annotation generated from the Grafana secret
    # This prevents endless sync loops caused by checksum changes
    - group: apps
      kind: Deployment
      name: monitoring-prometheus-grafana
      namespace: monitoring
      jsonPointers:
        - /spec/template/metadata/annotations/checksum~1secret
