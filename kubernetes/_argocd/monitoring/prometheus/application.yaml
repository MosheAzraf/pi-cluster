apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-prometheus
  namespace: argocd
spec:
  project: default

  sources:
    #Helm chart
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 81.5.0
      helm:
        skipSchemaValidation: true
        valueFiles:
          - $values/kubernetes/monitoring/prometheus/values.yaml

    #Values reference
    - repoURL: https://github.com/MosheAzraf/pi-cluster.git
      targetRevision: main
      ref: values

    #KSOPS
    - repoURL: https://github.com/MosheAzraf/pi-cluster.git
      targetRevision: main
      path: kubernetes/monitoring/prometheus
      kustomize: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
