apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-ksops
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/MosheAzraf/pi-cluster
    targetRevision: main
    path: test-ksops

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
