apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-cert-manager-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/MosheAzraf/pi-cluster.git
    targetRevision: main
    path: kubernetes/infrastructure/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
