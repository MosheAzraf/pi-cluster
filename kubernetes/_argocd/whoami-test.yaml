# ======================
# ArgoCD Application
# ======================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MosheAzraf/pi-cluster.git
    targetRevision: main
    path: kubernetes/apps/whoami-test
  destination:
    server: https://kubernetes.default.svc
    namespace: whoami-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# ======================
# Namespace
# ======================
apiVersion: v1
kind: Namespace
metadata:
  name: whoami-test
---
# ======================
# whoami Deployment
# ======================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: whoami-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          ports:
            - containerPort: 80
---
# ======================
# Service
# ======================
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: whoami-test
spec:
  selector:
    app: whoami
  ports:
    - port: 80
      targetPort: 80
---
# ======================
# IngressRoute (TLS)
# ======================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami
  namespace: whoami-test
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`whoami.home.lab`)
      kind: Rule
      services:
        - name: whoami
          port: 80
  tls:
    secretName: whoami-tls
---
# ======================
# Certificate
# ======================
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: whoami-tls
  namespace: whoami-test
spec:
  secretName: whoami-tls
  issuerRef:
    name: internal-ca
    kind: ClusterIssuer
  dnsNames:
    - whoami.home.lab
